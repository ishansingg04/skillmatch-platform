{% extends 'base.html' %}
{% block title %}Login - SkillMatch{% endblock %}
{% block content %}
<div class="card card-center">
    <h2 class="text-center">Welcome Back</h2>
    <p class="text-center" style="margin-bottom: 2rem;">Login to your account.</p>

    <form method="POST">
        <div class="form-group">
            <label for="name">Username</label>
            <input type="text" name="name" id="name" class="input-field" required placeholder="Enter your username">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" class="input-field" required placeholder="Enter your password">
        </div>
        
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Login</button>
    </form>
    
    <p class="text-center" style="margin-top: 1.5rem; font-size: 0.9rem;">
        Don't have an account? <a href="/register" style="color: var(--primary); font-weight: 500; text-decoration: none;">Register here</a>
    </p>
</div>
{% endblock %}
