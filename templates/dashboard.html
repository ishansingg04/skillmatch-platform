<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="match-header" style="justify-content:center; margin-bottom:20px;">
        <div class="avatar">
            {{ username[0] | upper }}
        </div>
        <h2>Welcome, {{ username }}</h2>
    </div>

    <!-- Skills Section -->
    <div class="card">
        <h3 style="text-align:center; margin-bottom:15px;">Your Skills</h3>

        {% if skills %}
            {% for skill in skills %}
                <div style="display:flex; justify-content:space-between; padding:6px 0;">
                    <span>
                        <strong>{{ skill[0] }}</strong>
                    </span>
                    <span>
                        {{ skill[1] }} | {{ skill[2] }}
                    </span>
                </div>
            {% endfor %}
        {% else %}
            <p style="text-align:center;">No skills added yet.</p>
        {% endif %}
    </div>

    <!-- Navigation Buttons -->
    <div class="card button-group">
        <a href="/add_skills/{{ session['user_id'] }}">
            <button>Add Skills</button>
        </a>

        <a href="/matches/{{ session['user_id'] }}">
            <button>View Matches</button>
        </a>

        <a href="/logout">
            <button>Logout</button>
        </a>
    </div>

</div>

</body>
</html>
